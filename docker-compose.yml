services:
  db:
    image: postgis/postgis:16-3.4
    container_name: luna-db
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna
      POSTGRES_DB: lunadb
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5435:5432"
    volumes:
      - luna_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luna -d lunadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luna-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna
      POSTGRES_DB: lunadb
      API_KEY: luna-static-api-key
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  luna_pg_data:
